name: live-trading-bot

on:
  # Scheduling is handled externally by cron-job.org, which fires
  # workflow_dispatch every 5 minutes during market hours via the
  # GitHub REST API. GitHub Actions' native `schedule:` was dropping
  # ~95% of ticks under platform load, so it's been removed.
  workflow_dispatch:

# Don't pile up runs if one is slow. Stateless bot, so cancelling old
# tick-in-flight when the next fires is fine; queueing is also safe.
concurrency:
  group: live-trading-bot
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    # One-click kill switch via repo Variables (Settings -> Secrets and
    # variables -> Actions -> Variables). Set LIVE_ENABLED="true" to arm,
    # unset or any other value to disable.
    if: ${{ vars.LIVE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install TA-Lib C library
        # libta-lib isn't in Ubuntu's default repos. Install the official
        # .deb from ta-lib's GitHub releases.
        run: |
          curl -fsSL -o ta-lib.deb https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib_0.6.4_amd64.deb
          sudo dpkg -i ta-lib.deb || sudo apt-get install -f -y

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run bot (live)
        env:
          ALPACA_KEY: ${{ secrets.LIVE_ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.LIVE_ALPACA_SECRET }}
          ALPACA_PAPER: "false"
          SYMBOLS: "IWM"
          RISK_PCT: "0.4"
          MINUTES_HISTORY: "60"
        run: python src/lambda_function.py
